on:
  workflow_dispatch:
  release:
    types: [published]

env:
  NODE_VERSION: 24
  REPOSITORY_URL: https://registry.npmjs.org/

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.REPOSITORY_URL }}
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: npm publish
